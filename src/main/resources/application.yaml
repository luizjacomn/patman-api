spring:
    application:
        name: patman-api
    datasource:
        url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${POSTGRES_DB}
        username: ${POSTGRES_USER}
        password: ${POSTGRES_PASSWORD}

flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

    jpa:
        hibernate:
            ddl-auto: validate
            format_sql: false

        show-sql: false
        open-in-view: false

logging:
    level:
        com.luizjacomn.patmanapi: WARN
